    <script>
        function playAudio(elemId, filePath) {
            if (!filePath || typeof filePath === "undefined") {
                return;
            }
            const somAudio = document.querySelector(elemId);
            somAudio.setAttribute("src", filePath);
            if (!somAudio.paused) {
                return;
            }
            somAudio.play();
        }
        setInterval(function () {
            // let painelSuperior = document.querySelector("#painel-superior");
            // let anexoArquivoImagem = document.querySelector("#anexoArquivoImagemSessao");
            // let anexoArquivoVideo = document.querySelector("#anexoArquivoVideoSessao");
            // let windowHeight = window.innerHeight;
            // let anexoArquivoSize = windowHeight - painelSuperior.clientHeight;
            // anexoArquivoImagem.style.height = anexoArquivoSize + "px";
            // anexoArquivoVideo.style.height = anexoArquivoSize + "px";
        }, 100)
        function proportionSet(prop, min) {
            const windowWidth = 720;
            const windowHeight = 520;
            const referenceWidth = 1024;
            const referenceHeight = 768;
            let proportion1 = windowWidth / referenceWidth;
            if (windowWidth > 1200 || windowHeight > 800) {
                proportion1 = windowWidth / (referenceWidth + referenceWidth - 1350);
            }
            var widthIncreaseCount = Math.floor((windowWidth - 1200) / 100);
            var heightIncreaseCount = Math.floor((windowHeight - 800) / 100);
            var totalReduction = (widthIncreaseCount + heightIncreaseCount) * 9.5;
            // Se a largura for significativamente maior que a altura, reduza a proporção
            if (windowWidth > windowHeight * 1.2) {
                totalReduction += (windowWidth - windowHeight) / 100;
            }
            if (totalReduction > 0) {
                proportion1 -= (totalReduction / 100);
            }
            let proportion2 = windowHeight / referenceHeight - 0.4;

            let result = prop * proportion1 * proportion2;
            result = Math.max(result, min);
            return result;
        }
        function adjustStyles() {

            const golsTime = document.querySelectorAll(".gols");

            const windowWidth = 720;
            const windowHeight = 520;
            const referenceWidth = 1224;
            const referenceHeight = 768;
            const proportion = windowWidth / referenceWidth;
            const proportion2 = windowHeight / referenceHeight;
            let painelSuperiorSize = proportionSet(90, 110);
            let cronometroFontSize = proportionSet(55, 75);
            let faltasFontSize = proportionSet(40, 48);
            let golsTimeFontSize = proportionSet(40, 70);
            let iconeTimeSize = proportionSet(75, 70);
            cronometro.style.fontSize = cronometroFontSize + "px";
            painelSuperior.style.height = painelSuperiorSize + "px";
            iconeTime.forEach((item) => {
                item.style.height = iconeTimeSize + "px";
            });
            iconeTime.forEach((item) => {
                item.style.height = iconeTimeSize + "px";
            });
            golsTime.forEach((item) => {
                item.style.fontSize = golsTimeFontSize + "px";
            });
            faltas.forEach((item) => {
                item.style.fontSize = faltasFontSize + "px";
            });

        }

        function adjustZoom() {
            const baseWidth = 720;
            const baseHeight = 520;
            const aspectRatio = window.innerWidth / window.innerHeight;
            const baseAspectRatio = baseWidth / baseHeight;
            let scale
            if (aspectRatio < baseAspectRatio) {
                scale = window.innerWidth / baseWidth;
                document.body.style.width = '100%';
            } else {
                scale = window.innerHeight / baseHeight;
                document.body.style.width = (100 / (aspectRatio * 0.7)) + '%'; // Ajuste o valor 0.5 conforme necessário
            }
            document.body.style.zoom = scale;
            document.body.style.height = (window.innerHeight / scale) + 'px';
            // document.body.style.display = "flex";
            document.querySelector("html").style.display = "flex";
            document.querySelector("html").style.justifyContent = "center";
            // document.body.style.alignItems = "center";
        }


        // Chama a função de ajuste de zoom quando o DOM estiver pronto
        document.addEventListener("DOMContentLoaded", function () {
            adjustStyles();
            adjustZoom();
        });

        window.addEventListener("resize", function () {
            adjustZoom();

        const { ipcRenderer } = require('electron');

        let carregouInfoPartida = false;

        function compactIntString(value, fallbackZero = false) {
            const s = (value ?? '').toString().trim();
            if (s === '') return fallbackZero ? '0' : '';
            const n = parseInt(s, 10);
            if (Number.isNaN(n)) return s;
            return String(n);
        }

        ipcRenderer.on('updatesFromControl', function (event, arg) {

            switch (arg['inputOrigin']) {
                case "#input-gols-time-01":
                    document.querySelector(".time-01 span.gols").innerHTML = compactIntString(arg['pontuacaoFormatada'], true);
                    break;
                case "#input-faltas-time-01":
                    document.querySelector(".time-01 span.faltas").innerHTML = compactIntString(arg['pontuacaoFormatada'], true);
                    break;
                case "#input-gols-time-02":
                    document.querySelector(".time-02 span.gols").innerHTML = compactIntString(arg['pontuacaoFormatada'], true);
                    break;
                case "#input-faltas-time-02":
                    document.querySelector(".time-02 span.faltas").innerHTML = compactIntString(arg['pontuacaoFormatada'], true);
                    break;
                default:
                // code block
            }

        });

        ipcRenderer.on('loadInformacoesPartida', function (event, arg) {
            if (carregouInfoPartida) {
                return;
            }
            document.querySelector(".time-01 span.gols").innerHTML = compactIntString(arg['time01']['gols'], true);
            document.querySelector(".time-01 span.faltas").innerHTML = compactIntString(arg['time01']['faltas'], true);
            document.querySelector(".time-02 span.gols").innerHTML = compactIntString(arg['time02']['gols'], true);
            document.querySelector(".time-02 span.faltas").innerHTML = compactIntString(arg['time02']['faltas'], true);
            carregouInfoPartida = true;
        });

        // Define as variáveis globais
        let partidaIniciada = false;

        let tempoTotal = 0;
        let tempoRestante = 0;
        let contador;
        let isContagemRegressiva = false;
        let pausarContagem = true;

        // Define a função que inicia o cronômetro
        function iniciarCronometro(tempo, contagemRegressiva = false) {
            pausarContagem = false;
            tempoTotal = tempo;
            isContagemRegressiva = contagemRegressiva;

            if (isContagemRegressiva) {
                tempoRestante = tempo;
            } else {
                tempoRestante = 0;
            }

            if (!carregouInfoPartida) {
                ipcRenderer.send("solicitaAtualizacoes", null);
            }
            // Define o contador com a função setInterval()
            contador = setInterval(function () {
                atualizarCronometro();
            }, 1000);
        }

        // Define a função que atualiza o cronômetro a cada segundo
        function atualizarCronometro() {
            // Verifica se o cronômetro chegou ao fim      
            if ((isContagemRegressiva && tempoRestante < 0) || (!isContagemRegressiva && tempoRestante > tempoTotal)) {
                playAudio('#player-sons', listaConfiguracoesSons['start_timeout']);

                clearInterval(contador);
                var min = config_setup_aquecimento_min
                var seg = config_setup_aquecimento_seg
                if (config_setup_aquecimento_min < 10) {
                    min = "0" + config_setup_aquecimento_min;
                }
                if (config_setup_aquecimento_seg < 10) {
                    seg = "0" + config_setup_aquecimento_seg;
                }
                setTimeout(function () {
                    //document.querySelector('.cronometro').innerHTML = `${min}:${seg}`;
                    ipcRenderer.send("sendCronometroAquecimento", `${min}:${seg}`);
                }, 2e3)


                return;
            }

            // Calcula os minutos e segundos restantes
            const minutos = Math.floor(tempoRestante / 60);
            const segundos = tempoRestante % 60;

            // Formata a saída do cronômetro
            const minutosStr = minutos.toString();
            const segundosStr = segundos.toString();

            // Exibe o cronômetro na página
            document.querySelector('.cronometro').innerHTML = `${minutosStr}:${segundosStr}`;
            ipcRenderer.send("sendCronometroAquecimento", `${minutosStr}:${segundosStr}`);

            // Atualiza o tempo restante de acordo com a contagem
            if (isContagemRegressiva) {
                tempoRestante--;
            } else {
                tempoRestante++;
            }
        }
    </script>

    <script>
        const sqlite3 = require('sqlite3').verbose();
        // const { ipcRenderer } = require('electron');
        const { pathToFileURL } = require('url');
        let dbPath = require('path').join(__dirname, '..', 'scoreboard.sqlite');
        (async () => { try { const p = await ipcRenderer.invoke('get-db-path'); if (p) dbPath = p; } catch (e) { } })();

        // Função para resolver corretamente o caminho de imagens/logos
        function resolveImageSrcForDisplay(storedPath) {
            if (!storedPath || typeof storedPath !== 'string') return "../resources/images/no-image.jpg";

            const p = storedPath.replace(/\\/g, '/');

            if (p.startsWith('file://')) return storedPath;
            if (/^[a-zA-Z]:\//.test(p)) return pathToFileURL(p).href;

            const isAsar = (window.location && window.location.href && window.location.href.includes('app.asar'));
            const assetsPrefix = isAsar ? '../../assets/' : '../resources/assets/';

            if (p.startsWith('../resources/assets/')) {
                return isAsar ? p.replace('../resources/assets/', '../../assets/') : p;
            }

            if (p.startsWith('images/')) {
                return assetsPrefix + p;
            }

            return p;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        var configSetup;
        async function getConfigSetup() {
            var db = new sqlite3.Database(dbPath);
            _ = await db.serialize(() => {
                db.all("SELECT * FROM config_jogo_setup", (err, rows) => {
                    if (err) {
                        console.error(err.message);
                    }
                    configSetup = rows;
                    setConfigSetup();
                });
            });
            db.close();
        }

        function setConfigSetup() {


            tempo_ataque = configSetup[0]["tempo_ataque"] ? configSetup[0]["tempo_ataque"] : 0;
            //   adicionarPontuacaoDefault('#input-tempo-ataque', '#label-tempo-ataque', '#btn-adicionar-tempo-ataque', tempo_ataque);

            config_setup_tempo_jogo = configSetup[0]["tempo_jogo"];

            config_setup_duracao_jogo_min = configSetup[0]["duracao_jogo_minutos"];
            config_setup_duracao_jogo_seg = configSetup[0]["duracao_jogo_segundos"];

            config_setup_aquecimento_min = configSetup[0]["aquecimento_jogo_minutos"];
            config_setup_aquecimento_seg = configSetup[0]["aquecimento_jogo_segundos"];

            var buzinaIniciar = configSetup[0]["toque_buzinar_iniciar"] === 1 ? true : false;
            config_setup_buzinar_iniciar = buzinaIniciar;

            var buzinaFaltar = configSetup[0]["toque_buzinar_final"] === 1 ? true : false;
            config_setup_buzinar_faltar = buzinaFaltar;

            var mostrarEcran = configSetup[0]["mostrar_ecran"];
            if (mostrarEcran === "T") {
                config_setup_mostrar_ecran_tempo = true;
                config_setup_mostrar_ecran_logo = false;
            } else {
                config_setup_mostrar_ecran_tempo = false;
                config_setup_mostrar_ecran_logo = true;
            }
            var tempoContar = config_setup_aquecimento_min * 60;
            tempoContar += config_setup_aquecimento_seg - 1;

            iniciarCronometro(tempoContar, true);

        }

    </script>

            const runId = ++slideshowRunId;
            listaAnexosTemp = [];

            for (let i = 0; i < configListaAnexo.length; i++) {

                let anexoAtual = configListaAnexo[i];

                id = anexoAtual['id'];
                lista = anexoAtual['tabela_id'];
                caminho = anexoAtual['caminho_arquivo'];
                tipo_arquivo = anexoAtual['tipo_arquivo'];
                duracao = anexoAtual['duracao'];
                const arquivo_data_blob = anexoAtual['arquivo_data'];
                console.log(`[Aquecimento] Item ${i}: ID=${id}, Tipo=${tipo_arquivo}, BLOB=${!!arquivo_data_blob}`);

                // Converter BLOB para Base64 se existir
                let arquivo_data_base64 = null;
                if (arquivo_data_blob) {
                    try {
                        arquivo_data_base64 = Buffer.from(arquivo_data_blob).toString('base64');
                        // console.log(`[Aquecimento] BLOB convertido para Base64 string (size: ${arquivo_data_base64.length})`);
                    } catch (e) {
                        console.error('[Aquecimento] Erro convertendo BLOB:', e);
                    }
                }

                var body = {
                    id: id,
                    lista: lista,
                    caminho: caminho,
                    tipo_arquivo: tipo_arquivo,
                    duracao: duracao,
                    arquivo_data: arquivo_data_base64
                };
                listaAnexosTemp.push(body);

            }

            if (listaAnexosTemp.length <= 0) {
                console.warn('[Aquecimento] Nenhum anexo encontrado.');
                document.querySelector("#anexoArquivoImagemSessao").classList.add("d-none");
                document.querySelector("#anexoArquivoVideoSessao").classList.add("d-none");
                return;
            }

            while (runId === slideshowRunId) {
                for (let i = 0; i < listaAnexosTemp.length; i++) {
                    if (runId !== slideshowRunId) break;
                    duracao = listaAnexosTemp[i]['duracao'];
                    const anexoAtual = listaAnexosTemp[i];
                    console.log(`[Aquecimento] Exibindo anexo ${i}:`, anexoAtual.tipo_arquivo);
                    verAnexo(anexoAtual);
                    // console.log(duracao);
                    await sleep(duracao * 1000);
                }
            }

        }

        function normalizeMime(tipoArquivo, caminhoArquivo) {
            const raw = (tipoArquivo || '').toString().trim().toLowerCase();
            if (raw === 'image/jpg') return 'image/jpeg';
            if (raw === 'jpg' || raw === 'jpeg') return 'image/jpeg';
            if (raw === 'png') return 'image/png';
            if (raw === 'mp4') return 'video/mp4';
            if (raw === 'webm') return 'video/webm';
            if (raw.includes('/')) return raw;

            const name = (caminhoArquivo || '').toString().toLowerCase();
            if (name.endsWith('.jpeg') || name.endsWith('.jpg')) return 'image/jpeg';
            if (name.endsWith('.png')) return 'image/png';
            if (name.endsWith('.mp4')) return 'video/mp4';
            if (name.endsWith('.webm')) return 'video/webm';
            return 'application/octet-stream';
        }

        function verAnexo(anexoAtual) {

            document.querySelector("#anexoArquivoVideo").pause();

            // Usar data URL do BLOB se disponível, senão usar caminho (retro-compatibilidade)
            let mediaSrc = resolveImageSrcForDisplay(anexoAtual['caminho']);
            if (anexoAtual['arquivo_data']) {
                const mime = normalizeMime(anexoAtual['tipo_arquivo'], anexoAtual['caminho']);
                mediaSrc = `data:${mime};base64,${anexoAtual['arquivo_data']}`;
                console.log(`[Aquecimento] Usando mediaSrc data URI (mime: ${mime})`);
            } else {
                console.log(`[Aquecimento] Usando mediaSrc arquivo: ${mediaSrc}`);
            }

            const isVideo = normalizeMime(anexoAtual['tipo_arquivo'], anexoAtual['caminho']).startsWith('video/');

            if (isVideo) {
                document.querySelector("#anexoArquivoVideoSessao").classList.remove("d-none");
                document.querySelector("#anexoArquivoImagemSessao").classList.add("d-none");
                document.querySelector("#anexoArquivoVideo source").setAttribute('src', mediaSrc);
                document.querySelector("#anexoArquivoVideo").load();
            } else {
                document.querySelector("#anexoArquivoImagemSessao").classList.remove("d-none");
                document.querySelector("#anexoArquivoVideoSessao").classList.add("d-none");
                document.querySelector("#anexoArquivoImagem").setAttribute('src', mediaSrc);
            }
        }

    </script>
