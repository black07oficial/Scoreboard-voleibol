    <script>
        // window.$ = window.jQuery = require('jquery');
        setInterval(function () {
            if (document.querySelector('#config_setup-tempo-slide').value < 1) {
                document.querySelector('#config_setup-tempo-slide').value = 1;
            }
        }, 100)
        const sqlite3 = require('sqlite3').verbose();
        const fsTemp = require('fs');
        const pathModule = require('path');
        const { ipcRenderer } = require('electron');

        let dbPath = null;

        // Inicialização assíncrona dos caminhos
        // Inicialização assíncrona dos caminhos
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('[DEBUG] DOMContentLoaded fired. Initializing DB path check...');
            try {
                dbPath = await ipcRenderer.invoke('get-db-path');
                // console.log('[DEBUG] DB Path obtido via IPC:', dbPath);

                // Carregar configurações apenas após ter o caminho do DB e o DOM estar pronto
                if (typeof loadConfigEquipas === 'function') {
                    loadConfigEquipas();
                } else {
                    console.error('loadConfigEquipas is not defined or not yet loaded');
                    // Fallback se necessário, ou avisar
                }

                if (typeof loadPaginacao === 'function') {
                    loadPaginacao();
                } else {
                    console.error('loadPaginacao is not defined or not yet loaded');
                }
            } catch (err) {
                console.error('Erro ao obter caminhos do sistema:', err);
                // ipcRenderer.send('send-alert', 'Erro crítico: Falha ao obter caminho do banco de dados.');
            }
        });

        // Helper para obter caminho de recursos dinamicamente
        function getResourcePath(subPath) {
            const basePath = pathModule.join(__dirname, '..', 'resources', 'assets');
            const fullPath = pathModule.join(basePath, subPath);
            if (!fsTemp.existsSync(fullPath)) {
                fsTemp.mkdirSync(fullPath, { recursive: true });
            }
            return fullPath;
        }

        function loadConfigEquipas() {
            getConfigEquipaTime("1");
            getConfigEquipaTime("2");
            getConfigEquipaTimeJogadores("1");
            getConfigEquipaTimeJogadores("2");
            getConfigEquipaGeral();
            getConfigSetup();
        }
        document.addEventListener('keydown', function (event) {
            if (event.keyCode === 116) {
                // O código 116 corresponde à tecla F5
                location.reload();
            }
        });
        let widthWindowPad = 1570;
        let heightWindowPad = 870;
        document.body.style.zoom = 1;
        let oldWindowWidth = widthWindowPad;
        let oldWindowHeight = heightWindowPad;
        function calculateScale(width) {
            const widthIncrement = 1000;
            const scaleIncrement = 1;
            const maxScale = 4; // Define a escala máxima

            const widthDiff = width - widthWindowPad;
            let scaleFactor = Math.max(1 + (Math.floor(widthDiff / widthIncrement) * scaleIncrement), 1);
            scaleFactor = Math.min(scaleFactor, maxScale); // Limita a escala ao máximo definido
            console.log(scaleFactor);
            return scaleFactor;
        }

        function adjustZoom() {
            const baseWidth = 1570;
            const baseHeight = 870;
            const aspectRatio = window.innerWidth / window.innerHeight;
            const baseAspectRatio = baseWidth / baseHeight;
            let scale
            if (aspectRatio < baseAspectRatio) {
                scale = window.innerWidth / baseWidth;
                document.body.style.width = '100%';
            } else {
                scale = window.innerHeight / baseHeight;
                // document.body.style.width = (100 / (aspectRatio * 0.7)) + '%'; // Ajuste o valor 0.5 conforme necessário
            }
            document.body.style.zoom = scale;

                    reader.onload = function (e) {
                        try {
                            const jsonData = JSON.parse(e.target.result);
                            resolve(jsonData);

            if (!dbPath) {

                return;

            var sqlite3 = require('sqlite3').verbose();
            var db = new sqlite3.Database(dbPath);
            var id = equipe == 1 ? 1 : 2;

            // Deletar jogadores antigos
            const delete_jogadores = `DELETE FROM config_equipas_times_jogadores WHERE time_id = ${id}`;
            db.run(delete_jogadores, function (err) {
                if (err) console.error('[Import] Erro ao deletar jogadores:', err);
                else console.log('[Import] Jogadores antigos deletados para time_id:', id);
            });

            // === BLOB: Verificar se tem logo_base64 (imagem embarcada) ===
            if (dados.logo_base64 && dados.logo_base64.startsWith('data:image/')) {
                console.log('[Import] Importando logo como BLOB...');
                const base64Data = dados.logo_base64.split(',')[1];
                const buffer = Buffer.from(base64Data, 'base64');

                const query_times_blob = `
                    UPDATE config_equipas_times SET
                    logo_data = ?,
                    logo_caminho = NULL,
                    nome = ?,
                    abreviatura = ?
                    WHERE id = ?
                `;
                db.run(query_times_blob, [buffer, dados.nome, dados.abreviatura, id], function (err) {
                    if (err) console.error('[Import] Erro ao atualizar time com BLOB:', err);
                    else console.log('[Import] Time atualizado com logo BLOB:', dados.nome);
                });
            } else {
                // Sem logo_base64 - atualizar apenas nome/abreviatura
                const query_times = `
                    UPDATE config_equipas_times SET
                    nome = ?,
                    abreviatura = ?
                    WHERE id = ?
                `;
                db.run(query_times, [dados.nome, dados.abreviatura, id], function (err) {
                    if (err) console.error('[Import] Erro ao atualizar time:', err);
                    else console.log('[Import] Time atualizado (sem logo):', dados.nome);
                });
            }
            var finish = 0;
            const inserirDados = async () => {
                if (!dados.jogadores || dados.jogadores.length === 0) {
                    console.log('[Import] Nenhum jogador para importar');
                    db.close();
                    setTimeout(() => {
                        window.location.reload();
                    }, 500);
                    return;
                }
                for (const item of dados.jogadores) {
                    console.log('[Import] Inserindo jogador:', item.nome, 'Foto Base64:', !!item.foto_base64);
                    finish++;
                    if (!item.list) {
                        item.list = null;
                    }

                    try {
                        // === BLOB: Verificar se tem foto_base64 (imagem embarcada) ===
                        if (item.foto_base64 && item.foto_base64.startsWith('data:image/')) {
                            const base64Data = item.foto_base64.split(',')[1];
                            const buffer = Buffer.from(base64Data, 'base64');

                            const queryBlob = `

                                    time_id, foto_data, foto_caminho, nome, camisa, posicao, list
                                ) VALUES (?, ?, NULL, ?, ?, ?, ?)
                            `;
                            await new Promise((resolve, reject) => {
                                db.run(queryBlob, [id, buffer, item.nome, item.camisa, item.posicao, item.list], function (err) {
                                    if (err) {
                                        console.error('[Import] Erro ao inserir jogador com BLOB:', err);
                                        reject(err);
                                    } else {
                                        console.log('[Import] Jogador inserido com foto BLOB:', item.nome);
                                        resolve();
                                    }
                                });
                            });
                        } else {
                            // Sem foto_base64 - inserir jogador sem foto
                            const query = `
                                INSERT INTO config_equipas_times_jogadores (
                                    time_id, nome, camisa, posicao, list
                                ) VALUES (?, ?, ?, ?, ?)
                            `;
                            await new Promise((resolve, reject) => {
                                db.run(query, [id, item.nome, item.camisa, item.posicao, item.list], function (err) {
                                    if (err) {
                                        console.error('[Import] Erro ao inserir jogador:', err);
                                        reject(err);
                                    } else {
                                        console.log('[Import] Jogador inserido (sem foto):', item.nome);
                                        resolve();
                                    }
                                });
                            });
                        }
                    } catch (error) {
                        console.error('[Import] Erro catch:', error);
                        alert('Erro ao importar: ' + error.message);
                    }
                }
                if (finish == dados.jogadores.length) {
                    console.log('[Import] Importação concluída! Recarregando...');
                    db.close();
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                }
            };

            inserirDados();
            console.log(finish);

        }

        async function saveConfigEquipaTimeJogadores(equipeId) {
            if (!dbPath) return;

            var tabela = equipeId === 1 ? "cfg-equipes-t1-lista" : "cfg-equipes-t2-lista";

                const fotoBlob = imgElem ? imgElem.getAttribute('data-blob') : null;

                if (fotoBlob && fotoBlob.startsWith('data:image/')) {

                        INSERT INTO config_equipas_times_jogadores
                            (time_id, nome, camisa, posicao, list)
                        VALUES(?, ?, ?, ?, ?)

                    await new Promise((resolve) => {

        async function saveConfigEquipaTime(equipeId) {
            if (!dbPath) {
                console.error('dbPath is not defined');
                ipcRenderer.send('send-alert', 'Erro crítico: Banco de dados não inicializado.');
                return;
            }
            const db = new sqlite3.Database(dbPath);
            console.log('[SaveTeam] Salvando equipe:', equipeId);

            const logoElem = document.querySelector("#img-cfg-equipes-t" + equipeId + "-logo");
            const nomeElem = document.querySelector("#edit-cfg-equipes-t" + equipeId + "-nome");
            const abrevElem = document.querySelector("#edit-cfg-equipes-t" + equipeId + "-abrev");

            const nome = (nomeElem && nomeElem.value ? nomeElem.value : "").toString().toUpperCase();
            const abreviatura = (abrevElem && abrevElem.value ? abrevElem.value : "").toString().toUpperCase();

            // === BLOB: Verificar se há BLOB (nova imagem) ===
            const blobData = logoElem ? logoElem.getAttribute('data-blob') : null;

            if (blobData && blobData.startsWith('data:image/')) {
                // Nova imagem carregada - salvar como BLOB
                console.log('[BLOB] Salvando nova imagem como BLOB...');

                // Converter Base64 para Buffer
                const base64Data = blobData.split(',')[1];
                const buffer = Buffer.from(base64Data, 'base64');

                const updateQuery = `
                    UPDATE config_equipas_times
                    SET
                        logo_data = ?,
                        logo_caminho = NULL,
                        nome = ?,
                        abreviatura = ?
                    WHERE id = ?
                `;

                try {
                    await new Promise((resolve, reject) => {
                        db.run(updateQuery, [buffer, nome, abreviatura, equipeId], function (err) {
                            if (err) {
                                ipcRenderer.send('send-alert', 'Falha ao salvar configurações, tente novamente.');
                                console.error('[BLOB] Erro:', err);
                                reject(err);
                            } else {
                                console.log('[BLOB] Imagem salva com sucesso!');
                                // Limpar o atributo data-blob após salvar
                                logoElem.removeAttribute('data-blob');
                                resolve();
                            }
                        });
                    });
                } catch (error) {
                    db.close();
                    return;
                }
            } else {
                // Sem nova imagem - manter dados existentes
                const updateQuery = `
                    UPDATE config_equipas_times
                    SET
                        nome = ?,
                        abreviatura = ?
                    WHERE id = ?
                `;

                try {
                    await new Promise((resolve, reject) => {
                        db.run(updateQuery, [nome, abreviatura, equipeId], function (err) {
                            if (err) {
                                ipcRenderer.send('send-alert', 'Falha ao salvar configurações, tente novamente.');

                                reject(err);
                            } else {
                                resolve();
                            }
                        });
                    });
                } catch (error) {
                    db.close();
                    return;
                }
            }

            db.close();

            // Await the deletion and subsequent insertion of players
            await deleteConfigEquipaTimeJogadores(equipeId);

            // Finally reload
            ipcRenderer.send('reload');
        }

    <!-- Configuracoes: Equipas/Jogadores -->
    <script>

        var configEquipaJogadores01;
        var configEquipaJogadores02;
        var arquivo;
        var origemModalJogador = "time01";

        var configEquipaTime01;
        var configEquipaTime02;

        async function getConfigEquipaTime(id) {
            if (!dbPath) {
                console.warn('[getConfigEquipaTime] dbPath is undefined, waiting or aborting');
                return;
            }
            const db = new sqlite3.Database(dbPath);
            _ = await db.serialize(() => {
                db.all("SELECT * FROM config_equipas_times where id =" + id, (err, rows) => {
                    if (err) {
                        console.error(err.message);
                    }
                    if (id === "1") {
                        configEquipaTime01 = rows;
                    } else {
                        configEquipaTime02 = rows;
                    }
                    // A carga dos logos já é feita na outra declaração de loadConfigEquipaTime lá em cima,
                    // mas vou manter chamando a função para atualizar os campos de texto.
                    loadConfigEquipaTime(id);
                });
            });
            db.close();
        }

        async function getConfigEquipaTimeJogadores(timeId) {
            if (!dbPath) return;
            var db = new sqlite3.Database(dbPath);
            _ = await db.serialize(() => {
                db.all("SELECT * FROM config_equipas_times_jogadores where time_id =" + timeId + " ORDER BY COALESCE(list, id)", (err, rows) => {
                    if (err) {
                        console.error(err.message);
                    }
                    console.log(rows);
                    if (timeId === "1") {
                        configEquipaJogadores01 = rows;
                    } else {
                        configEquipaJogadores02 = rows;
                    }
                    loadConfigEquipaTimeJogadores(timeId);
                });
            });
            db.close();
        }

        function loadConfigEquipaTimeJogadores(equipeId) {
            var configuration = equipeId === "1" ? configEquipaJogadores01 : configEquipaJogadores02;
            var tabela = equipeId === "1" ? "#cfg-equipes-t1-lista" : "#cfg-equipes-t2-lista";

            apagarLinhas(tabela);
            if (!configuration) return;
            for (let i = 0; i < configuration.length; i++) {

                let jogadorAtual = configuration[i];

                id = jogadorAtual['id'];
                time_id = jogadorAtual['time_id'];
                camisa = jogadorAtual['camisa'];
                nome = jogadorAtual['nome'];
                posicao = jogadorAtual['posicao'];

                // === BLOB ONLY: Carregar foto diretamente do BLOB ===
                let fotoSrc = null;
                if (jogadorAtual['foto_data'] && jogadorAtual['foto_data'].length > 0) {
                    const base64 = jogadorAtual['foto_data'].toString('base64');
                    fotoSrc = `data:image/png;base64,${base64}`;
                } else if (jogadorAtual['foto_caminho']) { // Fallback para logo_caminho
                    fotoSrc = jogadorAtual['foto_caminho'];
                }

                addRow(id, time_id, fotoSrc, camisa, nome, posicao, tabela);

            }

        }

        function apagarLinhas(tableName) {
            const tbody = document.querySelector(tableName + " tbody");
            tbody.innerHTML = '';
        }

        function addRow(id, time_id, foto_caminho, camisa, nome, posicao, tabela) {
            const table = document.querySelector(tabela);
            const rows = table.querySelectorAll("tr");
            const maxRows = 17;

            if (rows.length < maxRows) {
                const newRow = createRow(id, time_id, foto_caminho, camisa, nome, posicao, tabela);
                table.querySelector("tbody").appendChild(newRow);
            } else {
                ipcRenderer.send('send-alert', 'Total máximo de 17 jogados atingido!');
            }
        }

        function createRow(id, time_id, foto_caminho, camisa, nome, posicao, tabela) {

            const timeId = tabela === "#cfg-equipes-t1-lista" ? "t1" : "t2";

            const row = document.createElement("tr");
            row.id = timeId + "_" + id;
            const cell1 = document.createElement("td");
            const img1 = document.createElement("img");
            img1.classList.add("foto-jogador");

            if (foto_caminho && foto_caminho.startsWith('data:image/')) {
                // Base64 data URL (BLOB)
                img1.src = foto_caminho;
                img1.setAttribute('data-blob', foto_caminho);
            } else if (foto_caminho && foto_caminho !== "null") {
                // Fallback caminho existia
                img1.src = foto_caminho;
            } else {
                // Sem foto
                img1.src = "../resources/images/no-image.jpg";
            }

            cell1.appendChild(img1);
            row.appendChild(cell1);

            const cell2 = document.createElement("td");
            const span1 = document.createElement("span");
            span1.classList.add("campo-texto");
            span1.textContent = camisa.toString().padStart(3, '0');
            span1.style.padding = "4px";
            span1.style.border = "1px solid #C9A680";
            span1.style.borderRadius = "10px";
            cell2.appendChild(span1);
            row.appendChild(cell2);

            const cell3 = document.createElement("td");
            cell3.width = "200px";
            const div3 = document.createElement("div");
            div3.style.padding = "4px";
            div3.style.border = "1px solid #C9A680";
            div3.style.borderRadius = "10px";
            const span2 = document.createElement("span");
            span2.classList.add("campo-texto");
            span2.textContent = nome;
            div3.appendChild(span2);
            cell3.appendChild(div3);
            row.appendChild(cell3);

            const cell4 = document.createElement("td");
            cell4.width = "150px";
            const div4 = document.createElement("div");
            div4.style.padding = "4px";
            div4.style.border = "1px solid #C9A680";
            div4.style.borderRadius = "10px";
            const span3 = document.createElement("span");
            span3.classList.add("campo-texto");
            span3.textContent = posicao;
            div4.appendChild(span3);
            cell4.appendChild(div4);
            row.appendChild(cell4);

            const cell6 = document.createElement("td");
            cell6.width = "150px";
            const div5 = document.createElement("div");
            div5.style.padding = "4px";
            // div5.style.border = "1px solid #C9A680";
            // div5.style.borderRadius = "10px";
            div5.innerHTML = `
            <div class="d-flex flex-column">
                <i class="up fa fa-caret-up" style="font-size: 25px; text-align: center; color: #254f9d; cursor: pointer;" onclick="moverParaCima(this.parentNode.parentNode.parentNode.parentNode)"></i>
                <i class="down fa fa-caret-down" style="font-size: 25px; margin-top:-10px; text-align: center;color: #254f9d; cursor: pointer;" onclick="moverParaBaixo(this.parentNode.parentNode.parentNode.parentNode)"></i>
            </div>

            `
            cell6.appendChild(div5);
            row.appendChild(cell6);

            const cell5 = document.createElement("td");
            cell5.innerHTML = '<button class="btn btn-danger" onclick="removerLinha(this)" style="padding: 5px 10px; font-size: 12px"><i class="fa fa-trash"></i></button>';
            row.appendChild(cell5);

            return row;

        }



        function moverParaCima(linha) {
            var anterior = linha.previousElementSibling;
            if (anterior) {
                linha.classList.add('mover-para-cima');
                anterior.classList.add('mover-para-baixo');
                setTimeout(function () {
                    linha.parentNode.insertBefore(linha, anterior);
                    linha.classList.remove('mover-para-cima');
                    anterior.classList.remove('mover-para-baixo');
                }, 400);
            }
        }

        function moverParaBaixo(linha) {
            var proximo = linha.nextElementSibling;
            if (proximo) {
                linha.classList.add('mover-para-baixo');
                proximo.classList.add('mover-para-cima');
                setTimeout(function () {
                    linha.parentNode.insertBefore(proximo, linha);
                    linha.classList.remove('mover-para-baixo');
                    proximo.classList.remove('mover-para-cima');
                }, 400);
            }
        }
        function removerLinha(elem) {
            var rowId = elem.parentElement.parentElement.id;
            document.querySelector("#" + rowId).remove();
        }

        function salvarImagem() {
            const file = document.querySelector('#jogadorFoto').files[0];
            if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                var body = {
                    imagePrefixo: file.name.toString(),
                    path: file.path,
                    newPath: 'images/temp/config_equipas_times_jogadores/' + ((origemModalJogador === "time01") ? "time_01" : "time_02")
                };
                ipcRenderer.send('salvarArquivo', body);
            } else {
                // alert('Por favor, selecione um arquivo de imagem .jpg ou .png');
                ipcRenderer.send('send-alert', 'Por favor, selecione um arquivo de imagem .jpg ou .png');
            }
        }

        document.querySelector('button#btn-cfg-equipes-t1-adicionar').addEventListener('click', function () {
            origemModalJogador = "time01";
        });

        document.querySelector('button#btn-cfg-equipes-t2-adicionar').addEventListener('click', function () {
            origemModalJogador = "time02";
        });

        // Armazena o dataURL da foto do jogador quando o ficheiro é selecionado
        var jogadorFotoDataUrl = null;

        document.querySelector('#jogadorFoto').addEventListener('change', function () {

            const file = document.querySelector('#jogadorFoto').files[0];
            jogadorFotoDataUrl = null;

            if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                // Ler como Base64 (BLOB) imediatamente ao selecionar
                const reader = new FileReader();
                reader.onload = function (e) {
                    jogadorFotoDataUrl = e.target.result; // data:image/...;base64,...
                    console.log('[BLOB] Foto jogador lida como Base64:', file.name);
                };
                reader.readAsDataURL(file);
            } else {
                ipcRenderer.send('send-alert', 'Por favor, selecione um arquivo de imagem .jpg ou .png');
                return;
            }

        });

        document.querySelector('button#btn-adicionar-jogador').addEventListener('click', function () {

            var tabela = origemModalJogador === "time01" ? "#cfg-equipes-t1-lista" : "#cfg-equipes-t2-lista";
            var timeId = origemModalJogador === "time01" ? "1" : "2";

            const file = document.querySelector('#jogadorFoto').files[0];

            if (!file || (!file.type === 'image/jpeg' && !file.type === 'image/png' && !(file.type === 'image/jpeg' || file.type === 'image/png'))) {
                ipcRenderer.send('send-alert', 'Por favor, selecione um arquivo de imagem .jpg ou .png');
                return;
            }

            if (!jogadorFotoDataUrl) {
                ipcRenderer.send('send-alert', 'A aguardar leitura da foto. Tente novamente em instantes.');
                return;
            }

            id = Math.random().toString(16).slice(12);
            time_id = timeId;
            camisa = document.querySelector('#jogadorCamisa').value.toString().toUpperCase();
            nome = document.querySelector('#jogadorNome').value.toString().toUpperCase();
            posicao = document.querySelector('#jogadorPosicao').value.toString().toUpperCase();
            if (camisa == "" || nome == "") {
                ipcRenderer.send('send-alert', 'Por favor, preencha o número da camisola e o nome!');
                return;
            }

            // Usar dataURL como fotoSrc — data-blob será definido por createRow
            addRow(id, time_id, jogadorFotoDataUrl, camisa, nome, posicao, tabela);

            document.querySelector('#jogadorCamisa').value = null;
            document.querySelector('#jogadorNome').value = null;
            document.querySelector('#jogadorPosicao').value = null;
            document.querySelector('#jogadorFoto').value = null;
            jogadorFotoDataUrl = null;
        });

    </script>

    <script>
        // window.onload moved to top async IIFE

        async function loadPaginacao() {
            if (!dbPath) return; // Segurança
            var db = new sqlite3.Database(dbPath);
            _ = await db.serialize(() => {
                db.get("SELECT jogadores_por_pagina FROM config_jogo_setup WHERE id=1", (err, row) => {
                    if (row) {
                        const el = document.getElementById('input-jogadores-pagina');
                        if (el) el.value = row.jogadores_por_pagina || 10;
                    }
                });
            });
            db.close();
        }

        document.getElementById('btn-salvar-paginacao')?.addEventListener('click', async function () {
            const el = document.getElementById('input-jogadores-pagina');
            if (!el) return;
            var val = el.value;
            if (!dbPath) {
                ipcRenderer.send('send-alert', 'Erro crítico: Banco de dados não inicializado.');
                return;
            }
            var db = new sqlite3.Database(dbPath);
            db.serialize(() => {
                db.run("UPDATE config_jogo_setup SET jogadores_por_pagina = " + val + " WHERE id=1", (err) => {
                    if (!err) {
                        ipcRenderer.send('send-alert', 'Configuração de paginação salva!');
                    } else {
                        console.error(err);
                        ipcRenderer.send('send-alert', 'Erro ao salvar: ' + err.message);
                    }
                });
            });
            db.close();
        });

        function openTab(tabName, elem) {
            window.location.href = tabName + ".html";
        }

        function retornar() {
            if (confirm("Você tem certeza que deseja reiniciar tudo?\n\n" +
                "Clique em OK para salvar as alterações e reiniciar.\n" +
                "Clique em Cancelar caso não deseje reiniciar.")) {
                ipcRenderer.send("closeWindowConfig", true);
            } else {
                ipcRenderer.send("closeWindowConfig", false);
            }
        }
    </script>
