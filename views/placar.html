            -moz-border-radius-bottomright: 10px;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            background-color: #000000 !important;
            padding: 8px;
            height: 100%;
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .desconto-ativo-2 {
            -webkit-border-top-left-radius: 10px;
            -webkit-border-bottom-left-radius: 10px;
            -moz-border-radius-topleft: 10px;
            -moz-border-radius-bottomleft: 10px;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            background-color: #39AA49 !important;
            padding: 8px;
            height: 100%;
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .desconto-ativo-black-2 {
            -webkit-border-top-left-radius: 10px;
            -webkit-border-bottom-left-radius: 10px;
            -moz-border-radius-topleft: 10px;
            -moz-border-radius-bottomleft: 10px;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            background-color: #000000 !important;
            padding: 8px;
            height: 100%;
            display: flex !important;

            justify-content: center;
            align-items: center;

        #edit-cfg-equipes-t1-nome,
        #edit-cfg-equipes-t3-nome {

        #edit-cfg-equipes-t2-nome,

        .lista-azul {
            background-color: #14d15d;

            margin-top: 5px;

        .cronometro {
            font-family: 'Digital Dismay', sans-serif;
            font-size: 120px;
            line-height: 70px;
            color: red;
            margin-bottom: 0px;
        }

        .faltas {
            font-family: 'Digital Dismay', sans-serif;
            font-size: 100px;

            font-weight: 100;
            /* color: rgb(255, 230, 0); */

        .painel-faltas-time-01 {
            background-color: rgb(0, 0, 0);
            text-align: center;
            padding: 2px;
            border-radius: 5px;
            margin-top: 0px;
            height: 100px;
            width: 100px;
        }

        .painel-faltas-time-02 {
            background-color: rgb(0, 0, 0);
            text-align: center;
            padding: 2px;
            border-radius: 5px;
            margin-top: 0px;
            height: 100px;
            width: 100px;
        }

        /* Media Queries para Responsividade */
        @media (max-width: 1200px) {
            .pontuacao {
                font-size: 140px;
                line-height: 95px;
            }

            .cronometro {
                font-size: 90px;
                line-height: 55px;
            }

            .icone-time {
                max-height: 85%;
            }

            .painel-pontuacao-time-01,
            .painel-pontuacao-time-02 {
                height: 120px;
            }

            .faltas {
                font-size: 80px;
                line-height: 80px;
            }

            .linha-decorativa {
                width: 35px;
                height: 8px;
            }

            .linhas-decorativas {
                gap: 10px;
                height: 80px;
            }
        }

        @media (max-width: 1000px) {
            .pontuacao {
                font-size: 110px;
                line-height: 75px;
            }

            .cronometro {
                font-size: 70px;
                line-height: 45px;
            }

            .icone-time {
                max-height: 80%;
            }

            .painel-pontuacao-time-01,
            .painel-pontuacao-time-02 {
                height: 100px;
            }

            .faltas {
                font-size: 60px;
                line-height: 60px;
            }

            .painel-faltas-time-01,
            .painel-faltas-time-02 {
                height: 70px;

            }

            .linha-decorativa {
                width: 28px;
                height: 6px;
            }

            .linhas-decorativas {
                gap: 8px;
                height: 65px;
                margin-top: -20px;
            }

            #edit-cfg-equipes-t4-nome {
                font-size: 20px;
            }
        }

        @media (max-width: 800px) {
            .pontuacao {
                font-size: 80px;
                line-height: 55px;
            }

            .cronometro {
                font-size: 50px;
                line-height: 35px;
            }

            .icone-time {
                max-height: 75%;
            }

            .painel-pontuacao-time-01,
            .painel-pontuacao-time-02 {
                height: 80px;
                padding-top: 8px;
            }

            .faltas {
                font-size: 45px;
                line-height: 45px;
            }

            .painel-faltas-time-01,
            .painel-faltas-time-02 {
                height: 55px;
                width: 55px;
                margin-top: 0px;
            }

            .linha-decorativa {
                width: 20px;
                height: 5px;
            }

            .linhas-decorativas {
                gap: 6px;
                height: 50px;
                margin-top: -15px;
            }

            .pontuacao-container {
                gap: 8px;
            }

            #edit-cfg-equipes-t1-nome,
            #edit-cfg-equipes-t2-nome,
            #edit-cfg-equipes-t3-nome,
            #edit-cfg-equipes-t4-nome {
                font-size: 16px;
            }

            .painel-cronometro {
                min-height: 80px;
                padding-top: 40px;
            }
        }

<body>
    <div class="" style="width: 100%; height: 100%; display: flex; flex-direction: column;">
        <!-- ROW 1: Logos + Cronometro -->
        <div class="d-flex" style="flex: 0 0 27%; overflow: hidden;">
            <div id="painel-info-time-01" class=" text-center informacoes-time desconto-ativo-black d-flex flex-column justify-content-center align-items-center"
                style="width:33.33333333%">
                <img id="img-cfg-equipes-t1-logo" class="icone-time" alt="Imagem" style="max-height: 70%;" />
                <p id="edit-cfg-equipes-t1-nome" class="gobold-bold" style="margin-top: 5px; margin-bottom: 0; font-size: 24px;"></p>
                <img id="img-cfg-equipes-t3-logo" class="icone-time d-none" alt="Imagem" style="max-height: 70%;" />
                <p id="edit-cfg-equipes-t3-nome" class="gobold-bold d-none" style="margin-top: 5px; margin-bottom: 0; font-size: 24px;"></p>
            </div>
            <div class="" style="width: 33.33333333%; margin-right: 7px; margin-left: 7px;">
                <div class="painel-cronometro">
                    <span class="cronometro">00:00</span>
                </div>
                <div class="d-flex justify-content-center">
                    <div class="painel-tempo-ataque d-none" id="ataque">
                        <span class="tempo-ataque">00</span>
                    </div>
                </div>
            </div>
            <div id="painel-info-time-02" class=" text-center informacoes-time desconto-ativo-black-2 d-flex flex-column justify-content-center align-items-center"
                style="width:33.33333333%">
                <img id="img-cfg-equipes-t2-logo" class="icone-time" alt="Imagem" style="max-height: 70%;" />
                <p id="edit-cfg-equipes-t2-nome" class="gobold-bold" style="margin-top: 5px; margin-bottom: 0; font-size: 24px;"></p>
                <img id="img-cfg-equipes-t4-logo" class="icone-time d-none" alt="Imagem" style="max-height: 70%;" />
                <p id="edit-cfg-equipes-t4-nome" class="gobold-bold d-none" style="margin-top: 5px; margin-bottom: 0; font-size: 24px;"></p>
            </div>
        </div>
        <!-- ROW 2: Pontuação + Faltas/Período -->
        <div class="d-flex faltas-tabela" style="flex: 0 0 24%; margin: 0; margin-top: 6px;">
            <div style="padding-left: 0px; width:33.33333333%; height: 100%;">
                <table style="width: 100%; height: 100%;">
                    <tbody style="height: 100%;">
                        <tr style="height: 100%;">
                            <td width="90%" style="height: 100%;">
                                <div class="painel-pontuacao-time-01 d-flex justify-content-end" style="gap:10px;">
                                    <div id="flex-lista-1" class="d-flex"
                                        style=" flex-direction: column; margin-left: -10px;">
                                        <div class="d-flex d-none lst-margin" id="time-1-1">
                                            <div class="lista-azul"></div>
                                        </div>
                                        <div class="d-flex d-none lst-margin" id="time-1-2">
                                            <div class="lista-azul"></div>
                                        </div>
                                        <div class="d-flex d-none lst-margin" id="time-1-3">
                                            <div class="lista-azul"></div>
                                        </div>
                                    </div>
                                    <div id="flex-lista-3" class="d-none"
                                        style="flex-direction: column; margin-left: -10px;">
                                        <div class="d-flex d-none lst-margin" id="time-3-1">
                                            <div class="lista-azul"></div>
                                        </div>
                                        <div class="d-flex d-none lst-margin" id="time-3-2">
                                            <div class="lista-azul"></div>
                                        </div>
                                        <div class="d-flex d-none lst-margin" id="time-3-3">
                                            <div class="lista-azul"></div>
                                        </div>
                                    </div>
                                    <div class="pontuacao-container d-flex" id="container-pontuacao-1">

                                            <div class="linha-decorativa"></div>
                                            <div class="linha-decorativa"></div>

                                    <div class="pontuacao-container d-none" id="container-pontuacao-3">

        function proportionSet(prop, min) {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const referenceWidth = 1024;
            const referenceHeight = 768;
            let proportion1 = windowWidth / referenceWidth;
            if (windowWidth > 1200 || windowHeight > 800) {
                proportion1 = windowWidth / (referenceWidth + referenceWidth - 1350);
            }
            var widthIncreaseCount = Math.floor((windowWidth - 1200) / 100);
            var heightIncreaseCount = Math.floor((windowHeight - 800) / 100);
            var totalReduction = (widthIncreaseCount + heightIncreaseCount) * 9.5;
            // Se a largura for significativamente maior que a altura, reduza a proporção
            if (windowWidth > windowHeight * 1.2) {
                totalReduction += (windowWidth - windowHeight) / 100;
            }
            if (totalReduction > 0) {
                proportion1 -= (totalReduction / 100);
            }
            let proportion2 = windowHeight / referenceHeight - 0.4;

            let result = prop * proportion1 * proportion2;
            result = Math.max(result, min);
            return result;
        }

        function apagarLinhas(tableName) {

            const table = document.querySelector(tableName); // seleciona a tabela
            let rowCount = table.rows; // conta quantas linhas há na tabela

            if (typeof rowCount === 'undefined') {
                return;
            }

            rowCount = rowCount.length;
            while (rowCount > 0) { // enquanto ainda houver linhas na tabela
                table.deleteRow(rowCount - 1); // remove a última linha
                rowCount--; // atualiza a contagem de linhas restantes
            }

        }

        function addRow(id, jogador, tempo, tabela) {
            const table = document.querySelector(tabela);
            const rows = table.querySelectorAll("tr");
            const maxRows = 2;

            // se ainda não tiver 3 linhas, adiciona uma nova no final
            if (rows.length < maxRows) {
                const newRow = createRow(id, jogador, tempo, tabela);
                table.querySelector("tbody").appendChild(newRow);
            } else {
                // se já tiver 3 linhas, remove a primeira e adiciona uma nova no final
                const firstRow = rows[0];
                const newRow = createRow(id, jogador, tempo, tabela);
                table.querySelector("tbody").appendChild(newRow);
                table.querySelector("tbody").removeChild(firstRow);
                // adjustStyles();
            }
        }

            } else {

                const row = document.createElement("tr");

                const cell2 = document.createElement("td");

    <script>
        const sqlite3 = require('sqlite3').verbose();
        // const { ipcRenderer } = require('electron');
        const { pathToFileURL } = require('url');
        let dbPath = require('path').join(__dirname, '..', 'scoreboard.sqlite');
        (async () => { try { const p = await ipcRenderer.invoke('get-db-path'); if (p) dbPath = p; } catch (e) { } })();

        // Função para resolver corretamente o caminho de imagens/logos
        function resolveImageSrcForDisplay(storedPath) {
            if (!storedPath || typeof storedPath !== 'string') return "../resources/images/no-image.jpg";

            const p = storedPath.replace(/\\/g, '/');

            if (p.startsWith('file://')) return storedPath;
            if (/^[a-zA-Z]:\//.test(p)) return pathToFileURL(p).href;

            const isAsar = (window.location && window.location.href && window.location.href.includes('app.asar'));
            const assetsPrefix = isAsar ? '../../assets/' : '../resources/assets/';

            if (p.startsWith('../resources/assets/')) {
                return isAsar ? p.replace('../resources/assets/', '../../assets/') : p;
            }

            if (p.startsWith('images/')) {
                return assetsPrefix + p;
            }

            return p;
        }
    </script>

        function loadConfigEquipaTime(equipeId) {
            var configuration = equipeId === "1" ? configEquipaTime01 : configEquipaTime02;

            let imgSrc = resolveImageSrcForDisplay(configuration[0]["logo_caminho"]);
            if (logoData && logoData.length > 0) {
                const base64 = Buffer.from(logoData).toString('base64');
                imgSrc = 'data:image/png;base64,' + base64;
            }

            document.querySelector("#img-cfg-equipes-t" + equipeId + "-logo").setAttribute('src', imgSrc);
            document.querySelector("#edit-cfg-equipes-t" + equipeId + "-nome").innerHTML = configuration[0]["nome"];
            if (equipeId === "2") {
                document.querySelector("#img-cfg-equipes-t" + 3 + "-logo").setAttribute('src', imgSrc);
                document.querySelector("#edit-cfg-equipes-t" + 3 + "-nome").innerHTML = configuration[0]["nome"];
            }
            if (equipeId === "1") {
                document.querySelector("#img-cfg-equipes-t" + 4 + "-logo").setAttribute('src', imgSrc);
                document.querySelector("#edit-cfg-equipes-t" + 4 + "-nome").innerHTML = configuration[0]["nome"];
            }
            document.querySelector("#img-equipe-" + equipeId).setAttribute('src', imgSrc);
            document.querySelector("#nome-equipe-" + equipeId).innerHTML = configuration[0]["abreviatura"];
        }

    <!-- Configuracoes: Jogo Setup -->
    <script>

        var configSetup;
        async function getConfigSetup() {
            var db = new sqlite3.Database(dbPath);
            _ = await db.serialize(() => {
                db.all("SELECT * FROM config_jogo_setup", (err, rows) => {
                    if (err) {
                        console.error(err.message);
                    }
                    configSetup = rows;
                    setConfigSetup();
                });
            });
            db.close();
        }

        function setConfigSetup() {

            // console.log(configSetup);

            tempo_ataque = configSetup[0]["tempo_ataque"] ? configSetup[0]["tempo_ataque"] : 0;
            mostrar_ataque = configSetup[0]["mostrar_ataque"];
            config_setup_tempo_jogo = configSetup[0]["tempo_jogo"];
            setInterval(() => {
                if (mostrar_ataque == 0) {
                    document.querySelector("#ataque").classList.add("d-none");
                } else {
                    document.querySelector("#ataque").classList.remove("d-none");
                }
            }, 100)
            config_setup_duracao_jogo_min = configSetup[0]["duracao_jogo_minutos"];
            config_setup_duracao_jogo_seg = configSetup[0]["duracao_jogo_segundos"];

            config_setup_desconto_min = configSetup[0]["desconto_tempo_minutos"];
            config_setup_desconto_seg = configSetup[0]["desconto_tempo_segundos"];

            var buzinaIniciar = configSetup[0]["toque_buzinar_iniciar"] === 1 ? true : false;
            config_setup_buzinar_iniciar = buzinaIniciar;

            var buzinaFaltar = configSetup[0]["toque_buzinar_final"] === 1 ? true : false;
            config_setup_buzinar_faltar = buzinaFaltar;

            var mostrarEcran = configSetup[0]["mostrar_ecran"];
            if (mostrarEcran === "T") {
                config_setup_mostrar_ecran_tempo = true;
                config_setup_mostrar_ecran_logo = false;
            } else {
                config_setup_mostrar_ecran_tempo = false;
                config_setup_mostrar_ecran_logo = true;
            }

            config_setup_faltar_min = configSetup[0]["tempo_final_minutos"];
            config_setup_faltar_seg = configSetup[0]["tempo_final_segundos"];

        }

    </script>

            // document.querySelector(".painel-anuncio").style.backgroundColor = ccores_display_screen_active_field;

        }
