<!doctype html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard - Apresentação Equipa 1</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.js"
        integrity="sha256-a9jBBRygX1Bh5lt8GZjXDzyOB+bWve9EiO7tROUtj/E=" crossorigin="anonymous"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N"
        crossorigin="anonymous"></script>

    <style>
        @font-face {
            font-family: 'Digital Dismay';
            src: url('../resources/fonts/digital_dismay.otf') format('truetype');
        }

        @font-face {
            font-family: 'Gobold';
            src: url('../resources/fonts/gobold_bold.otf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Gobold, Arial, sans-serif;
        }

        .main-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        /* Linha horizontal - centro exato */
        .horizontal-line {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: transparent;
            z-index: 100;
        }

        /* Linha vertical - centro exato */
        .vertical-line {
            position: fixed;
            left: 50%;
            top: 0;
            height: 100%;
            width: 2px;
            background-color: transparent;
            z-index: 100;
        }

        /* Logo e nome da equipa */
        .team-info {
            position: fixed;
            top: 0;
            left: 0;
            width: 35%;
            height: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Centralizado */
            justify-content: center;
            padding: 20px;
            padding-right: 20px;
            z-index: 50;
        }

        .team-logo {
            flex: 1;
            /* Ocupa espaço disponivel */
            min-height: 0;
            /* Permite encolher flex item */
            max-width: 100%;
            object-fit: contain;
            object-position: right center;
            /* Alinha a imagem dentro do container a direita */
        }

        .team-name {
            display: none;
            flex-shrink: 0;
            /* Nao encolher o nome */
            font-size: 2.5vw;
            font-weight: bold;
            color: white;
            margin-top: 10px;
            text-align: right;
            /* Alinhar texto a direita para combinar com logo */
        }

        /* Grupos de Jogadores - Container unificado */
        .group-container {
            position: fixed;
            left: 25%;
            width: 75%;
            height: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px 0 0;
        }

        .group-top {
            top: 0;
            border-bottom: 1px solid transparent;
            /* Linha horizontal visual se necessário, mas o main wrapper já tem */
        }

        .group-bottom {
            top: 50%;
        }

        .player-row {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 1.2vh;
        }

        .player-number {
            font-family: 'Digital Dismay', sans-serif;
            font-size: min(11vw, 13vh);
            line-height: 1;
            color: #FFD700;
            width: 33.33%;
            /* 1/3 de 75% = 25% da tela (Zona esquerda da linha) */
            text-align: right;
            padding-right: 30px;
            /* Espaço antes da linha */
        }

        .player-name {
            font-size: min(9.5vw, 11vh);
            line-height: 1;
            color: white;
            font-family: Gobold, Arial, sans-serif;
            flex: 1;
            white-space: nowrap;
            overflow: visible;
            text-transform: uppercase;
            padding-left: 30px;
            /* Espaço depois da linha */
        }

        /* Compact Mode for 7 players */
        .layout-compact .player-number {
            font-size: min(8.7vw, 11vh);
        }

        .layout-compact .player-name {
            font-size: min(6.5vw, 9vh);
        }

        .layout-compact .player-row {
            margin-bottom: 0.5vh;
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <!-- Linhas da cruz -->
        <div class="horizontal-line"></div>
        <div class="vertical-line"></div>

        <!-- Logo e nome da equipa -->
        <div class="team-info">
            <img id="img-cfg-equipes-logo" class="team-logo" alt="Logo" src="" />
            <div id="nome-equipe" class="team-name">EQUIPA</div>
        </div>

        <!-- Grupo 1 (Topo) -->
        <div class="group-container group-top" id="group-1"></div>

        <!-- Grupo 2 (Fundo) -->
        <div class="group-container group-bottom" id="group-2"></div>
    </div>

    <script>
        window.$ = window.jQuery = require('jquery');
        const { ipcRenderer } = require('electron');
        const sqlite3 = require('sqlite3').verbose();
        const path = require('path');

        // Definir caminho absoluto do banco de dados
        let dbPath;
        try {
            const isPackaged = !process.execPath.includes('node_modules');
            if (isPackaged) {
                dbPath = path.join(path.dirname(process.execPath), 'scoreboard.sqlite');
            } else {
                dbPath = path.join(__dirname, '..', 'scoreboard.sqlite');
            }
        } catch (err) {
            dbPath = './scoreboard.sqlite';
        }

        var configEquipaTime = null;
        var configEquipaJogadores = [];

        // Paginação
        var limitPerPage = 14;
        var slideTime = 5000;
        var currentPage = 0;
        var paginationInterval = null;

        // Controle de Apresentação
        var isPaused = false;
        var totalPages = 1;

        // IPC Listeners para Controle
        ipcRenderer.on('presentation-control-pause', () => {
            isPaused = !isPaused;
            sendPresentationStatus();
        });

        ipcRenderer.on('presentation-control-next', () => {
            currentPage++;
            if (currentPage >= totalPages) currentPage = 0;
            restartInterval();
            loadConfigEquipaTimeJogadores();
        });

        ipcRenderer.on('presentation-control-prev', () => {
            currentPage--;
            if (currentPage < 0) currentPage = totalPages - 1;
            restartInterval();
            loadConfigEquipaTimeJogadores();
        });

        function restartInterval() {
            if (paginationInterval) {
                clearInterval(paginationInterval);
                paginationInterval = null;
            }
        }

        function sendPresentationStatus() {
            ipcRenderer.send('presentation-status-update', {
                isActive: true,
                isPaused: isPaused,
                currentIndex: currentPage + 1,
                total: totalPages,
                currentPlayer: "Apresentação de Equipa"
            });
        }

        function getConfigSetup() {
            var db = new sqlite3.Database(dbPath);
            db.all("SELECT * FROM config_jogo_setup where id = 1", function (err, rows) {
                if (!err && rows && rows[0]) {
                    if (rows[0].jogadores_por_pagina) limitPerPage = rows[0].jogadores_por_pagina;
                    if (rows[0].slide_tempo) slideTime = rows[0].slide_tempo * 1000; // Converter para ms
                }
                db.close();
                // Carrega os jogadores DEPOIS de ter a config para garantir limite correto
                getConfigEquipaTimeJogadores("1");
            });
        }

        function getConfigEquipaTime(id) {
            var db = new sqlite3.Database(dbPath);
            db.all("SELECT * FROM config_equipas_times where id =" + id, function (err, rows) {
                if (err) {
                    console.error('Erro ao carregar equipa:', err.message);
                    db.close();
                    return;
                }
                configEquipaTime = rows;
                loadConfigEquipaTime();
                db.close();
            });
        }

        function loadConfigEquipaTime() {
            if (configEquipaTime && configEquipaTime[0]) {
                var nome = configEquipaTime[0]["abreviatura"] || configEquipaTime[0]["nome"] || "EQUIPA";
                document.getElementById("nome-equipe").textContent = nome;

                // BLOB ONLY: usar logo_data
                const logoData = configEquipaTime[0]["logo_data"];
                if (logoData && logoData.length > 0) {
                    const base64 = Buffer.from(logoData).toString('base64');
                    document.getElementById("img-cfg-equipes-logo").src = `data:image/png;base64,${base64}`;
                } else {
                    document.getElementById("img-cfg-equipes-logo").src = '../resources/images/no-image.jpg';
                }
            }
        }

        function getConfigEquipaTimeJogadores(timeId) {
            var db = new sqlite3.Database(dbPath);
            db.all("SELECT * FROM config_equipas_times_jogadores where time_id =" + timeId + " order by COALESCE(list, id) asc", function (err, rows) {
                if (err) {
                    console.error('Erro ao carregar jogadores:', err.message);
                    db.close();
                    return;
                }
                configEquipaJogadores = rows || [];
                loadConfigEquipaTimeJogadores();
                db.close();
            });
        }

        function loadConfigEquipaTimeJogadores() {
            var group1 = document.getElementById('group-1');
            var group2 = document.getElementById('group-2');

            group1.innerHTML = '';
            group2.innerHTML = '';

            var jogadores = [];
            for (var i = 0; i < configEquipaJogadores.length; i++) {
                var j = configEquipaJogadores[i];
                var pos = (j.posicao || '').toString().toUpperCase().trim();
                // Ocultar tecnicos como antes
                if (pos !== 'TREINADOR' && pos !== 'TÉCNICO' && pos !== 'TECNICO') {
                    jogadores.push(j);
                }
            }

            // Lógica de Paginação
            var total = jogadores.length;
            if (total > limitPerPage) {
                totalPages = Math.ceil(total / limitPerPage); // Update global totalPages
                if (currentPage >= totalPages) currentPage = 0;

                var start = currentPage * limitPerPage;
                var end = start + limitPerPage;

                // Fatiar array para a pagina atual
                jogadores = jogadores.slice(start, end);

                if (!paginationInterval) {
                    paginationInterval = setInterval(function () {
                        if (!isPaused) {
                            currentPage++;
                            loadConfigEquipaTimeJogadores(); // Recarrega (re-renderiza) com nova pagina
                        }
                    }, slideTime);
                }
            } else {
                totalPages = 1; // Default
                sendPresentationStatus(); // Send status for single page too

                if (paginationInterval) {
                    clearInterval(paginationInterval);
                    paginationInterval = null;
                }
                currentPage = 0;
            }

            var total = jogadores.length;

            if (total > 6) {
                document.body.classList.add('layout-compact');
            } else {
                document.body.classList.remove('layout-compact');
            }

            if (total === 0) {
                return;
            }

            // Lógica de balanceamento
            // Lógica de balanceamento: Prioriza 3 em cima
            var splitIndex;
            if (total <= 3) {
                splitIndex = total;
            } else {
                splitIndex = Math.max(3, Math.ceil(total / 2));
            }

            // Mas maximo 4 em cima
            if (splitIndex > 4) splitIndex = 4;

            // Se total for ímpar (ex: 7), 4 cima / 3 baixo (ceil ja faz isso: 3.5 -> 4)
            // Se total for 5, 3 cima / 2 baixo

            var group1Players = jogadores.slice(0, splitIndex);
            var group2Players = jogadores.slice(splitIndex);

            // Grupo 1 (em cima)
            for (var i = 0; i < group1Players.length; i++) {
                group1.appendChild(createPlayerRow(group1Players[i]));
            }

            // Grupo 2 (em baixo)
            for (var i = 0; i < group2Players.length; i++) {
                group2.appendChild(createPlayerRow(group2Players[i]));
            }

            sendPresentationStatus(); // Update status on render
        }

        function createPlayerRow(jogador) {
            var row = document.createElement('div');
            row.className = 'player-row';

            // Número
            var numDiv = document.createElement('div');
            numDiv.className = 'player-number';
            var camisa = jogador.camisa ? jogador.camisa.toString() : '0';
            numDiv.textContent = camisa;

            // Tocar som/falar não é necessário aqui, é só display visual

            // Nome
            var nameDiv = document.createElement('div');
            nameDiv.className = 'player-name';
            nameDiv.textContent = formatPlayerName(jogador.nome || '');

            row.appendChild(numDiv);
            row.appendChild(nameDiv);

            return row;
        }

        function formatPlayerName(nomeCompleto) {
            if (!nomeCompleto) return "";

            // Remover espaços extras
            var parts = nomeCompleto.trim().split(/\s+/);

            if (parts.length === 1) {
                return parts[0].toUpperCase();
            }

            // Pegar último sobrenome
            var sobrenome = parts[parts.length - 1];

            // Pegar inicial do primeiro nome
            var inicial = parts[0].charAt(0).toUpperCase() + ".";

            return (inicial + " " + sobrenome).toUpperCase();
        }

        ipcRenderer.on('reloadAll', function (event, args) {
            // Recarrega config setup tambem para pegar mudancas de limite/tempo
            getConfigSetup();
            getConfigEquipaTime("1");
            // getConfigEquipaTimeJogadores chamado dentro de getConfigSetup
        });

        window.onload = function () {
            getConfigEquipaTime("1");
            getConfigSetup(); // Inicia cadeia de carregamento (Setup -> Jogadores)
        };
    </script>

    <!-- Fix NAPI Crash: Graceful Reload -->
    <script>
        if (typeof ipcRenderer !== 'undefined') {
            ipcRenderer.on('force-graceful-reload', () => {
                setTimeout(() => {
                    window.location.reload();
                }, 150);
            });
        }
    </script>
</body>

</html>
