        // ============================================
        // FUNÇÕES LEGADAS REMOVIDAS
        // ============================================
        // proportionSet() - REMOVIDA (conflitava com zoom CSS)
        // propWSet() - REMOVIDA (conflitava com zoom CSS)
        // adjustStyles() - REMOVIDA (conflitava com zoom CSS)
        //
        // Agora usamos apenas CSS zoom para escalar todo o conteúdo
        // proporcionalmente mantendo as proporções originais perfeitas

        // ============================================
        // SISTEMA DE ZOOM BASEADO EM CSS
        // ============================================
        // Remove adjustStyles() para evitar conflito com zoom CSS
        // O zoom CSS escala TODO o conteúdo proporcionalmente
        
        function adjustZoom() {
            const baseWidth = 1920;  // Resolução base de referência (Full HD width)
            const baseHeight = 1080; // Resolução base de referência (Full HD height)
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Calcula a escala baseada na menor proporção para caber tudo na tela
            const scaleX = windowWidth / baseWidth;
            const scaleY = windowHeight / baseHeight;
            const scale = Math.min(scaleX, scaleY);

            // Aplica o zoom para escalar todo o conteúdo proporcionalmente
            document.body.style.zoom = scale;
            
            // Mantém tamanho fixo do body
            document.body.style.width = baseWidth + 'px';
            document.body.style.height = baseHeight + 'px';
            
            // Remove centralização para preencher espaço vazio acima
            document.documentElement.style.display = 'block';
            document.documentElement.style.height = '100vh';
            document.documentElement.style.margin = '0';
            document.documentElement.style.padding = '0';
            document.documentElement.style.overflow = 'hidden';
        }

        // Chama a função de ajuste de zoom quando o DOM estiver pronto
        document.addEventListener("DOMContentLoaded", function () {
            adjustZoom();
        });

        var arraySets = [];

        // Chama a função de ajuste de zoom sempre que a janela for redimensionada
        window.addEventListener("resize", function () {

        ipcRenderer.on('sendNovoSet', function (event, arg) {
            arraySets = arg;
            $("#time1").html("");
            $("#time2").html("");
            if (arraySets.length <= 0) {
                $('#set-1').css('padding-bottom', '0px');
                $('#set-2').css('padding-top', '0px');
            } else {
                $('#set-1').css('padding-bottom', '0px');
                $('#set-2').css('padding-top', '0px');
            }
            var html1 = '';
            var html2 = '';
            arraySets.forEach((element, index) => {
                // Converter valores para números para comparação
                var score1 = parseInt(element.time1) || 0;
                var score2 = parseInt(element.time2) || 0;

                // Determinar cores baseado em quem ganhou o set
                var color1 = 'white';
                var color2 = 'white';

                if (score1 > score2) {
                    // Time 1 ganhou o set - vermelho para time 1
                    color1 = 'red';
                } else if (score2 > score1) {
                    // Time 2 ganhou o set - vermelho para time 2
                    color2 = 'red';
                } else if (score1 === score2 && (score1 > 0 || score2 > 0)) {
                    // Empate (ambos ficam vermelhos se houver pontuação)
                    color1 = 'red';
                    color2 = 'red';
                }

                if (element.time1) {
                    html1 += `
                    <div class="digital_dismay"
                        style="font-size: 150px; min-width: 170px; width: 170px; text-align: center; color: ${color1}; line-height:130px; margin-right: 35px; margin-top: 10px;">
                        ${element.time1}
                    </div>
                    `
                }
                if (element.time2) {
                    html2 += `
                    <div class="digital_dismay"
                        style="font-size: 150px; min-width: 170px; width: 170px; text-align: center; color: ${color2}; line-height:130px; margin-right: 35px; margin-top: -10px;">
                        ${element.time2}
                    </div>
                    `
                }
            })
            $('#time1').html(html1);
            $('#time2').html(html2);
        });

        function apagarLinhas(tableName) {

            const table = document.querySelector(tableName); // seleciona a tabela
            let rowCount = table.rows; // conta quantas linhas há na tabela

            if (typeof rowCount === 'undefined') {
                return;
            }

            rowCount = rowCount.length;
            while (rowCount > 0) { // enquanto ainda houver linhas na tabela
                table.deleteRow(rowCount - 1); // remove a última linha
                rowCount--; // atualiza a contagem de linhas restantes
            }

        }

        function addRow(id, jogador, tempo, tabela) {
            const table = document.querySelector(tabela);
            const rows = table.querySelectorAll("tr");
            const maxRows = 2;

            // se ainda não tiver 3 linhas, adiciona uma nova no final
            if (rows.length < maxRows) {
                const newRow = createRow(id, jogador, tempo, tabela);
                table.querySelector("tbody").appendChild(newRow);
            } else {
                // se já tiver 3 linhas, remove a primeira e adiciona uma nova no final
                const firstRow = rows[0];
                const newRow = createRow(id, jogador, tempo, tabela);
                table.querySelector("tbody").appendChild(newRow);
                table.querySelector("tbody").removeChild(firstRow);
                // adjustStyles();
            }
        }

        function createRow(id, jogador, tempo, tabela) {

            if (tabela === ".painel-exclusoes-time-01 table") {
                const row = document.createElement("tr");
                row.id = id;
                const cell1 = document.createElement("td");

                span1.classList.add("player-hour");
                if (ccores_penalty_time) {
                    span1.style.color = ccores_penalty_time;
                }
                span1.style.marginLeft = '15px';
                span1.textContent = tempo;

                cell1.appendChild(span2);
                cell1.appendChild(span1);
                row.appendChild(cell1);
                // adjustStyles();


                return row;
            } else {

                const row = document.createElement("tr");
                row.id = id;

                const cell2 = document.createElement("td");
                cell2.style.textAlign = "end";
                cell2.style.paddingRight = "10px";
                cell2.style.width = "50px";

        }

    <script>
        const sqlite3 = require('sqlite3').verbose();
        // const { ipcRenderer } = require('electron');
        const { pathToFileURL } = require('url');
        let dbPath = require('path').join(__dirname, '..', 'scoreboard.sqlite');

        // Função para resolver corretamente o caminho de imagens/logos
        function resolveImageSrcForDisplay(storedPath) {
            if (!storedPath || typeof storedPath !== 'string') return "../resources/images/no-image.jpg";

            const p = storedPath.replace(/\\/g, '/');

            if (p.startsWith('file://')) return storedPath;
            if (/^[a-zA-Z]:\//.test(p)) return pathToFileURL(p).href;

            const isAsar = (window.location && window.location.href && window.location.href.includes('app.asar'));
            const assetsPrefix = isAsar ? '../../assets/' : '../resources/assets/';

            if (p.startsWith('../resources/assets/')) {
                return isAsar ? p.replace('../resources/assets/', '../../assets/') : p;
            }

            if (p.startsWith('images/')) {
                return assetsPrefix + p;
            }

            return p;
        }
    </script>

            const logoData = configuration[0]["logo_data"];
            let imgSrc = resolveImageSrcForDisplay(configuration[0]["logo_caminho"]);
            if (logoData && logoData.length > 0) {
                const base64 = Buffer.from(logoData).toString('base64');
                imgSrc = 'data:image/png;base64,' + base64;
            }

            document.querySelector("#img-cfg-equipes-t" + equipeId + "-logo").setAttribute('src', imgSrc);
            document.querySelector("#edit-cfg-equipes-t" + equipeId + "-nome").innerHTML = configuration[0]["nome"];
            if (equipeId === "2") {
                document.querySelector("#img-cfg-equipes-t" + 3 + "-logo").setAttribute('src', imgSrc);
                document.querySelector("#edit-cfg-equipes-t" + 3 + "-nome").innerHTML = configuration[0]["nome"];
            }
            if (equipeId === "1") {
                document.querySelector("#img-cfg-equipes-t" + 4 + "-logo").setAttribute('src', imgSrc);
                document.querySelector("#edit-cfg-equipes-t" + 4 + "-nome").innerHTML = configuration[0]["nome"];
            }
            document.querySelector("#img-equipe-" + equipeId).setAttribute('src', imgSrc);
            document.querySelector("#nome-equipe-" + equipeId).innerHTML = configuration[0]["abreviatura"];
        }

    </script>

    <!-- Video Overlay -->
    <div id="video-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99999;">
        <video id="video-player" style="width:100%; height:100%; object-fit:contain;"></video>
    </div>
    <script>
        (function() {
            const { ipcRenderer: vidIpc } = require('electron');
            const overlay = document.getElementById('video-overlay');
            const player = document.getElementById('video-player');
            let currentVolume = 1;

            vidIpc.on('play-video-placar', (event, filePath) => {
                player.src = filePath;
                player.volume = currentVolume;
                overlay.style.display = 'block';
                player.play();
            });

            vidIpc.on('stop-video-placar', () => {
                player.pause();
                player.src = '';
                overlay.style.display = 'none';
            });

            vidIpc.on('set-video-volume', (event, value) => {
                currentVolume = value / 100;
                if (player) {
                    player.volume = currentVolume;
                }
            });

            vidIpc.on('pause-video-placar', () => {
                if (player.paused) {
                    player.play();
                } else {
                    player.pause();
                }
            });

            player.addEventListener('ended', () => {
                overlay.style.display = 'none';
                player.src = '';
            });

            player.addEventListener('timeupdate', () => {
                if (player.duration) {
                    vidIpc.send('video-progress-update', (player.currentTime / player.duration) * 100);
                }
            });

            vidIpc.on('set-video-progress', (event, percentage) => {
                if (player && player.duration) {
                    player.currentTime = (percentage / 100) * player.duration;
                }
            });
        })();
    </script>
